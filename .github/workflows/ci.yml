# The `just verify` gate — the repo's own definition of "everything CI / a code
# review checks" (see justfile) — enforced on every push to main and every PR.
# Runs on macos-latest: matches the target platform, and Tauri's `app` crate
# compiles against the built-in macOS webview with zero system-dep setup.
#
# Steps mirror `just verify` (fmt-check lint test ui-check ui-test ui-build) and
# are kept separate so a failure names itself in the Actions UI. Order is not
# load-bearing: the Rust steps compile billz-app fine on a clean runner without
# app/ui/dist (verified) — a dev-profile `cargo build` doesn't require the
# frontendDist that `tauri build` bundling would.
name: CI
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: bun install
        run: cd app/ui && bun install --frozen-lockfile   # CI-only: reproducible; local `just install` is unfrozen
      - run: just fmt-check
      - run: just lint
      - run: just test
      - run: just ui-check
      - run: just ui-test
      - run: just ui-build
