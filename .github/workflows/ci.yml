# The `just verify` gate — the repo's own definition of "everything CI / a code
# review checks" (see justfile) — enforced on every push to main and every PR.
#
# Runs on ubuntu-latest for COST: on a private repo GitHub bills macOS runners at
# 10x the Linux rate, and this gate compiles + tests + lints only (no signed
# `tauri build` bundle, which is the only step that truly needs macOS). The Tauri
# `app` crate links webkit2gtk/gtk3 on Linux, so those system deps are installed
# below. deny.toml already keeps the workspace Linux-buildable.
#
# Steps mirror `just verify` (fmt-check lint test ui-check ui-test ui-build) and
# are kept separate so a failure names itself in the Actions UI. Order is not
# load-bearing: the Rust steps compile billz-app fine without app/ui/dist
# (verified) — only `tauri build` bundling requires the frontendDist.
#
# Skips docs/beads-only changes (paths-ignore) so those don't burn CI minutes.
name: CI
on:
  push:
    branches: [main]
    paths-ignore: ['**.md', '.beads/**']
  pull_request:
    paths-ignore: ['**.md', '.beads/**']
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: bun install
        run: cd app/ui && bun install --frozen-lockfile   # CI-only: reproducible; local `just install` is unfrozen
      - run: just fmt-check
      - run: just lint
      - run: just test
      - run: just ui-check
      - run: just ui-test
      - run: just ui-build
